<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ── SEO ───────────────────────────────────────────────── -->
    <title>Nepal News Hub – Latest News from Nepal in English & Nepali</title>
    <meta name="description" content="Nepal News Hub aggregates the latest breaking news from 21+ trusted Nepali news sources in one place. Read politics, business, sports, tech and health news in English and Nepali.">
    <meta name="keywords" content="Nepal news, Nepali news, Nepal breaking news, Nepal samachar, online khabar, Himalayan Times, BBC Nepali, Nepal politics, Nepal business">
    <meta name="author" content="Nepal News Hub">
    <link rel="canonical" href="https://nepalnewshub.pages.dev/">

    <!-- ── Open Graph (Facebook / WhatsApp preview) ──────────── -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://nepalnewshub.pages.dev/">
    <meta property="og:title" content="Nepal News Hub – Latest News from Nepal">
    <meta property="og:description" content="Fast, reliable, bilingual news aggregator for Nepal. 21+ trusted sources in one place.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=1200&q=80">

    <!-- ── Twitter Card ───────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Nepal News Hub – Latest News from Nepal">
    <meta name="twitter:description" content="Fast, reliable, bilingual news aggregator for Nepal.">
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=1200&q=80">

    <!-- ── Structured Data (helps Google show your site nicely) ── -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "NewsMediaOrganization",
        "name": "Nepal News Hub",
        "url": "https://nepalnewshub.pages.dev/",
        "description": "Bilingual news aggregator covering Nepal from 21+ trusted sources",
        "areaServed": "NP",
        "inLanguage": ["en", "ne"]
    }
    </script>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Mukta:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3036335622208432" crossorigin="anonymous"></script>
</head>
<body>
    <header class="main-header">
        <div class="container header-content">
            <div class="logo-area">
                <h1>Nepal <span class="highlight">News Hub</span></h1>
                <p class="tagline">Fast • Reliable • Free</p>
            </div>
            <div class="header-actions">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search news..." aria-label="Search news">
                    <button onclick="performSearch()" aria-label="Search"><i class="fas fa-search"></i></button>
                </div>
                <div class="controls-group">
                    <select id="langSwitcher" class="lang-select" onchange="changeLanguage(this.value)" aria-label="Language">
                        <option value="en">English</option>
                        <option value="np">नेपाली</option>
                    </select>
                    <label class="toggle-switch">
                        <input type="checkbox" id="dataSaverToggle" aria-label="Data saver mode">
                        <span class="slider"></span>
                        <span class="label-text">Data</span>
                    </label>
                    <button class="icon-btn" onclick="showBookmarks()" aria-label="Bookmarks"><i class="fas fa-bookmark"></i></button>
                </div>
            </div>
        </div>
    </header>

    <div class="ticker-wrap">
        <div class="container ticker-container">
            <span class="ticker-label">BREAKING:</span>
            <div class="ticker-move" id="tickerContent">Loading...</div>
        </div>
    </div>

    <main class="container">
        <div class="controls-bar">
            <div class="filters-scroll">
                <button class="filter-btn active" onclick="filterNews('all')">All</button>
                <button class="filter-btn" onclick="filterNews('politics')">Politics</button>
                <button class="filter-btn" onclick="filterNews('business')">Business</button>
                <button class="filter-btn" onclick="filterNews('sports')">Sports</button>
                <button class="filter-btn" onclick="filterNews('tech')">Tech</button>
                <button class="filter-btn" onclick="filterNews('health')">Health</button>
            </div>
            <div class="sort-dropdown">
                <label for="sortSelect">Sort:</label>
                <select id="sortSelect" aria-label="Sort news">
                    <option value="newest">Newest</option>
                    <option value="oldest">Oldest</option>
                    <option value="trending">Trending</option>
                    <option value="source">Source</option>
                </select>
            </div>
        </div>

        <div id="topBannerContainer" class="banner-container"></div>

        <div id="newsGrid" class="news-grid">
            <div class="loading-state">
                <i class="fas fa-circle-notch fa-spin"></i>
                <span>Loading news...</span>
            </div>
        </div>

        <div id="emptyState" class="empty-state" style="display:none;">
            <i class="fas fa-search"></i>
            <h3>No news found</h3>
            <p>Try different keywords</p>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <h4>Nepal News Hub</h4>
                    <p>Your trusted news source</p>
                </div>
                <div class="footer-links">
                    <a href="privacy.html">Privacy Policy</a>
                    <a href="contact.html">Contact</a>
                    <a href="about.html">About Us</a>
                </div>
            </div>
            <div class="copyright">© 2026 Nepal News Hub 🇳🇵</div>
        </div>
    </footer>

    <script src="Script.js"></script>
</body>
</html>
